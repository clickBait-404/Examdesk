version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: examdesk_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: examdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d examdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: examdesk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API ─────────────────────────────────────────────────────────
  api:
    build: .
    container_name: examdesk_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/examdesk
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app               # hot reload in dev
      - uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  uploads:
